<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard | Paragon University</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Paragon University</a>
        <div>
            <a class="nav-link d-inline text-white me-3" href="/">Home</a>
            <a class="nav-link d-inline text-white me-3" href="/dashboard">Dashboard</a>
            <a class="nav-link d-inline text-white" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card p-5 shadow-lg">

        <h2 class="text-primary mb-4">
            Welcome, <span th:text="${student.fullName}"></span> 🎓
        </h2>

        <table class="table table-bordered table-hover">
            <tr>
                <th>ID</th>
                <td th:text="${student.id}"></td>
            </tr>
            <tr>
                <th>Email</th>
                <td th:text="${student.email}"></td>
            </tr>
            <tr>
                <th>Grade</th>
                <td th:text="${student.grade}"></td>
            </tr>
            <tr>
                <th>Phone Number</th>
                <td th:text="${student.phoneNumber}"></td>
            </tr>
        </table>

    </div>
</div>

</body>
</html>
