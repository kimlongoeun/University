<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register | Paragon University</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Paragon University</a>
        <div>
            <a class="nav-link d-inline text-white me-3" href="/">Home</a>
            <a class="nav-link d-inline text-white me-3" href="/register">Register</a>
            <a class="nav-link d-inline text-white me-3" href="/login">Login</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card p-5 shadow-lg">
        <h2 class="text-center text-primary mb-4">Student Registration</h2>

        <form th:action="@{/register}" th:object="${student}" method="post">
            <div class="row">

                <div class="col-md-6 mb-3">
                    <input type="text" th:field="*{fullName}" class="form-control" placeholder="Full Name" required>
                </div>

                <div class="col-md-6 mb-3">
                    <input type="email" th:field="*{email}" class="form-control" placeholder="Email" required>
                </div>

                <div class="col-md-6 mb-3">
                    <input type="password" th:field="*{password}" class="form-control" placeholder="Password" required>
                </div>

                <div class="col-md-6 mb-3">
                    <input type="text" th:field="*{grade}" class="form-control" placeholder="Grade" required>
                </div>

                <div class="col-md-12 mb-3">
                    <input type="text" th:field="*{phoneNumber}" class="form-control" placeholder="Phone Number" required>
                </div>

            </div>

            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
    </div>
</div>

</body>
</html>
