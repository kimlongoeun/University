<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — NextGen University</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root {
            --navy: #0B0C10; --navy2: #1F2833;
            --gold: #66FCF1; --gold-light: #45A29E;
            --cream: #FFFFFF; --muted: rgba(197,198,199,0.8);
            --border: rgba(102,252,241,0.2);
            --card-bg: rgba(31,40,51,0.9);
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--cream); min-height: 100vh; display: flex; align-items: center; }
        .bg-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 60% 60% at 85% 85%, rgba(102,252,241,0.07) 0%, transparent 55%), linear-gradient(160deg, #0B0C10 0%, #0B0C10 50%, #1F2833 100%); }
        .grid-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(102,252,241,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(102,252,241,0.04) 1px, transparent 1px); background-size: 64px 64px; }
        .page-wrap { position: relative; z-index: 1; width: 100%; padding: 40px 16px; }

        .back-link { display: inline-flex; align-items: center; gap: 7px; color: var(--muted); font-size: 13px; text-decoration: none; margin-bottom: 32px; transition: color 0.2s; animation: fadeUp 0.5s both; }
        .back-link:hover { color: var(--gold); }
        .back-link:hover i { transform: translateX(-3px); }
        .back-link i { transition: transform 0.2s; }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 48px 42px; backdrop-filter: blur(20px); animation: fadeUp 0.6s 0.1s both; max-width: 500px; margin: 0 auto; }

        .seal { width: 46px; height: 46px; border: 1.5px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; font-size: 19px; color: var(--gold); font-weight: 700; margin-bottom: 18px; }
        .card-title { font-family: 'DM Sans', sans-serif; font-size: 32px; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
        .card-title em {  color: var(--gold); }
        .card-subtitle { font-size: 14px; color: rgba(197,198,199,0.85); margin-bottom: 28px; line-height: 1.6; }

        .progress-dots { display: flex; gap: 5px; margin-bottom: 28px; }
        .dot { height: 3px; flex: 1; border-radius: 2px; background: rgba(102,252,241,0.18); }
        .dot.on { background: #66FCF1; }

        .form-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(197,198,199,0.9); margin-bottom: 7px; }
        .form-control, .form-select { background: rgba(255,255,255,0.07) !important; border: 1px solid rgba(102,252,241,0.35) !important; border-radius: 7px !important; color: var(--cream) !important; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 12px 15px; transition: border-color 0.2s, background 0.2s; }
        .form-control:focus, .form-select:focus { border-color: var(--gold) !important; background: rgba(102,252,241,0.07) !important; box-shadow: none !important; color: var(--cream) !important; }
        .form-control::placeholder { color: rgba(197,198,199,0.5); }
        .form-select option { background: #1F2833; color: var(--cream); }
        .form-control.is-invalid { border-color: rgba(224,92,92,0.5) !important; }
        .invalid-feedback { font-size: 12px; color: #f08080; }

        .form-check-input { accent-color: #66FCF1; }
        .form-check-label { font-size: 13px; color: var(--muted); }
        .form-check-label a { color: var(--gold); text-decoration: none; }
        .form-check-label a:hover { color: #45A29E; }

        .btn-submit { width: 100%; padding: 14px; background: #66FCF1; border: none; color: #0B0C10; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.09em; text-transform: uppercase; cursor: pointer; transition: all 0.25s; }
        .btn-submit:hover { background: #45A29E; transform: translateY(-1px); box-shadow: 0 8px 22px rgba(102,252,241,0.35); }

        .alert-danger { background: rgba(224,92,92,0.12); border: 1px solid rgba(224,92,92,0.3); color: #f08080; border-radius: 7px; font-size: 13px; padding: 11px 15px; }

        .card-foot { text-align: center; font-size: 14px; color: var(--muted); margin-top: 20px; }
        .card-foot a { color: var(--gold); text-decoration: none; }
        .card-foot a:hover { color: #45A29E; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 480px) { .card { padding: 36px 22px; } }
    </style>
</head>
<body>
<div class="bg-layer"></div>
<div class="grid-layer"></div>

<div class="page-wrap">
    <div class="container">
        <a th:href="@{/}" class="back-link"><i class="bi bi-arrow-left"></i> Back to home</a>

        <div class="card">
            <div class="seal">N</div>
            <h1 class="card-title">Join NextGen</h1>
            <p class="card-subtitle">Create your student account and start your academic journey with us.</p>

            <div class="progress-dots">
                <div class="dot on"></div>
                <div class="dot on"></div>
                <div class="dot"></div>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger mb-3">
                <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
            </div>

            <form th:action="@{/register}" th:object="${studentDTO}" method="post" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="row g-3 mb-3">
                    <div class="col-sm-6">
                        <label class="form-label">First Name</label>
                        <input type="text" th:field="*{firstName}"
                               th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                               class="form-control" placeholder="" autocomplete="given-name"/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" th:field="*{lastName}"
                               th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                               class="form-control" placeholder="" autocomplete="family-name"/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">University Email</label>
                    <input type="email" th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                           class="form-control" placeholder="example@gmail.com" autocomplete="email"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Field of Study</label>
                    <select th:field="*{major}" class="form-select">
                        <option value="">Select your major...</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Business Administration">Business Administration</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Medicine">Medicine</option>
                        <option value="Law">Law</option>
                        <option value="Economics">Economics</option>
                        <option value="Psychology">Psychology</option>
                        <option value="Architecture">Architecture</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control"
                           placeholder="Minimum 8 characters" autocomplete="new-password"/>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="terms" required/>
                    <label class="form-check-label" for="terms">
                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>
            </form>

            <div class="card-foot">Already enrolled? <a th:href="@{/login}">Sign in &rarr;</a></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
