<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login | Paragon University</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Paragon University</a>
        <div>
            <a class="nav-link d-inline text-white me-3" href="/">Home</a>
            <a class="nav-link d-inline text-white me-3" href="/register">Register</a>
            <a class="nav-link d-inline text-white me-3" href="/login">Login</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card p-5 shadow-lg col-md-6 mx-auto">

        <h2 class="text-center text-success mb-4">Student Login</h2>

        <form th:action="@{/login}" method="post">

            <div th:if="${param.error}" class="alert alert-danger">
                Invalid email or password!
            </div>

            <div th:if="${param.logout}" class="alert alert-success">
                You have been logged out.
            </div>

            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Email" required>
            </div>

            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-success w-100">Login</button>

        </form>
    </div>
</div>

</body>
</html>
