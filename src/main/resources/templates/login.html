<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In — Paragoniu University</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root {
            --navy: #0b1120; --navy2: #0f1a35;
            --gold: #c9a84c; --gold-light: #e8c97a;
            --cream: #f5f0e8; --muted: rgba(245,240,232,0.5);
            --border: rgba(201,168,76,0.18);
            --card-bg: rgba(15,26,53,0.75);
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--cream); min-height: 100vh; display: flex; align-items: center; }
        .bg-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 70% 70% at 10% 90%, rgba(201,168,76,0.07) 0%, transparent 55%), linear-gradient(160deg, #070c18 0%, #0b1120 60%, #0f1a35 100%); }
        .grid-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px); background-size: 64px 64px; }
        .page-wrap { position: relative; z-index: 1; width: 100%; padding: 40px 16px; }

        .back-link { display: inline-flex; align-items: center; gap: 7px; color: var(--muted); font-size: 13px; text-decoration: none; margin-bottom: 32px; transition: color 0.2s; animation: fadeUp 0.5s both; }
        .back-link:hover { color: var(--gold); }
        .back-link i { transition: transform 0.2s; }
        .back-link:hover i { transform: translateX(-3px); }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 48px 42px; backdrop-filter: blur(20px); animation: fadeUp 0.6s 0.1s both; max-width: 440px; margin: 0 auto; }

        .seal { width: 46px; height: 46px; border: 1.5px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 19px; color: var(--gold); font-weight: 700; margin-bottom: 18px; }
        .card-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 400; margin-bottom: 8px; }
        .card-title em { font-style: italic; color: var(--gold); }
        .card-subtitle { font-size: 14px; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }

        .form-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
        .form-control {
            background: rgba(255,255,255,0.04) !important;
            border: 1px solid rgba(201,168,76,0.22) !important;
            border-radius: 7px !important;
            color: var(--cream) !important;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px; padding: 12px 15px;
            transition: border-color 0.2s, background 0.2s;
        }
        .form-control:focus { border-color: var(--gold) !important; background: rgba(201,168,76,0.05) !important; box-shadow: none !important; color: var(--cream) !important; }
        .form-control::placeholder { color: rgba(245,240,232,0.22); }

        .form-check-input { accent-color: var(--gold); }
        .form-check-label { font-size: 13px; color: var(--muted); }

        .forgot-link { font-size: 13px; color: var(--gold); text-decoration: none; }
        .forgot-link:hover { color: var(--gold-light); }

        .btn-submit { width: 100%; padding: 14px; background: var(--gold); border: none; color: var(--navy); border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.09em; text-transform: uppercase; cursor: pointer; transition: all 0.25s; }
        .btn-submit:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 8px 22px rgba(201,168,76,0.35); }

        .divider { display: flex; align-items: center; gap: 14px; color: rgba(245,240,232,0.2); font-size: 12px; margin: 20px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(201,168,76,0.14); }

        .card-foot { text-align: center; font-size: 14px; color: var(--muted); }
        .card-foot a { color: var(--gold); text-decoration: none; }
        .card-foot a:hover { color: var(--gold-light); }

        .alert { border-radius: 7px; font-size: 13px; padding: 11px 15px; }
        .alert-danger { background: rgba(224,92,92,0.12); border: 1px solid rgba(224,92,92,0.3); color: #f08080; }
        .alert-success { background: rgba(80,180,120,0.12); border: 1px solid rgba(80,180,120,0.3); color: #7ecfa0; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 480px) { .card { padding: 36px 22px; } }
    </style>
</head>
<body>
<div class="bg-layer"></div>
<div class="grid-layer"></div>

<div class="page-wrap">
    <div class="container">
        <a th:href="@{/}" class="back-link"><i class="bi bi-arrow-left"></i> Back to home</a>

        <div class="card">
            <div class="seal">P</div>
            <h1 class="card-title">Welcome <em>back</em></h1>
            <p class="card-subtitle">Sign in to access your student portal and continue your academic journey.</p>

            <!-- Thymeleaf alert messages -->
            <div th:if="${param.error}" class="alert alert-danger">
                <i class="bi bi-exclamation-circle me-2"></i>Invalid email or password. Please try again.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                <i class="bi bi-check-circle me-2"></i>You have been signed out successfully.
            </div>
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

            <!-- Spring Security handles POST /login -->
            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label class="form-label" for="username">Email Address</label>
                    <input type="email" id="username" name="username" class="form-control"
                           placeholder="you@paragoniu.edu" autocomplete="email" required/>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                           placeholder="••••••••" autocomplete="current-password" required/>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="remember-me" id="remember"/>
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit mb-3">Sign In</button>
            </form>

            <div class="divider">or</div>
            <div class="card-foot">Don't have an account? <a th:href="@{/register}">Create one &rarr;</a></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
